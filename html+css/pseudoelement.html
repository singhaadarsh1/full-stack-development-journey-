<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pseudoelement</title>
    <link rel="stylesheet" href="pseudoelement.css">
</head>
<body>
    <!--Pseudo-element=keyword added after a selector thats
    used to style a specific parts of an element 
    
    selector::pseudo-element
    ex-h1::first-letter{
    }-->
    <h1>hello</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. At mollitia corporis ducimus commodi nostrum nam assumenda distinctio minima iusto dolorem, deleniti non. A dolore voluptatum soluta eligendi debitis dignissimos nulla?</p>
    <ul id="fruit">
        <li id="apple"></li>
        <li id="banana"></li>
        <li id="mango"></li>
    </ul>
        
</body>
</html>
